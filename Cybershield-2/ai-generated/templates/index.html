<!doctype html>
<html>
  <head>
    <title>AI vs Real Image Detector</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
      }
      img {
        margin-top: 20px;
        max-width: 400px;
      }
      .result {
        font-size: 24px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h1>AI vs Real Image Detection</h1>

    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required />
      <button type="submit">Predict</button>
    </form>

    {% if image_path %}
    <img src="{{ image_path }}" />
    {% endif %} {% if result %}
    <div class="result">
      <p><strong>Result:</strong> {{ result }}</p>
      <p><strong>Confidence:</strong> {{ confidence | round(2) }}%</p>
    </div>
    {% endif %}
  </body>
</html>
